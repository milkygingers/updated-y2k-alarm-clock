<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y2K Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Pink outer casing — the "surrounding" she loves */
    .clock-outer {
      background: linear-gradient(145deg, #ffadd4 0%, #ff7fc0 45%, #ffadd4 100%);
      border-radius: 22px;
      padding: 14px;
      position: relative;
      box-shadow:
        0 0 24px rgba(255, 120, 190, 0.45),
        0 0 50px rgba(255, 120, 190, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.55),
        inset 0 -2px 4px rgba(180, 60, 130, 0.25);
    }

    /* Transparent inner gap — replaces the old white bezel */
    .clock-bezel {
      background: transparent;
      border-radius: 13px;
      padding: 4px;
    }

    /* Dark LCD screen */
    .clock-lcd {
      background: linear-gradient(150deg, #181d2a 0%, #0d1017 100%);
      border-radius: 10px;
      padding: 12px 20px 12px 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 3px 10px rgba(0, 0, 0, 0.65),
        inset 0 0 30px rgba(0, 0, 0, 0.3);
    }

    /* Scanline overlay for LCD feel */
    .clock-lcd::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.045) 2px,
        rgba(0, 0, 0, 0.045) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Subtle green inner glow on the LCD */
    .clock-lcd::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(ellipse at center, rgba(0, 232, 162, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .period {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: #00e8a2;
      text-shadow: 0 0 8px #00e8a2, 0 0 14px rgba(0, 232, 162, 0.45);
      letter-spacing: 1px;
      min-width: 24px;
      line-height: 1;
      align-self: flex-start;
      padding-top: 9px;
      position: relative;
      z-index: 2;
    }

    .time-main {
      display: flex;
      align-items: center;
      gap: 0;
      line-height: 1;
      position: relative;
      z-index: 2;
    }

    .digit-group {
      font-family: 'VT323', monospace;
      font-size: 68px;
      color: #00e8a2;
      text-shadow:
        0 0 8px #00e8a2,
        0 0 18px rgba(0, 232, 162, 0.55),
        0 0 36px rgba(0, 232, 162, 0.22);
      letter-spacing: 3px;
      line-height: 1;
    }

    .sep {
      font-family: 'VT323', monospace;
      font-size: 68px;
      color: #00e8a2;
      text-shadow: 0 0 8px #00e8a2;
      line-height: 1;
      padding: 0 2px;
      position: relative;
      z-index: 2;
      animation: blink 1s step-end infinite;
    }

    .seconds {
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: #00e8a2;
      text-shadow: 0 0 8px #00e8a2, 0 0 14px rgba(0, 232, 162, 0.45);
      letter-spacing: 1px;
      min-width: 24px;
      line-height: 1;
      align-self: flex-end;
      padding-bottom: 9px;
      position: relative;
      z-index: 2;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }
  </style>
</head>
<body>
  <div class="clock-outer">
    <div class="clock-bezel">
      <div class="clock-lcd">
        <div class="period" id="period">AM</div>
        <div class="time-main">
          <span class="digit-group" id="hours">12</span>
          <span class="sep">:</span>
          <span class="digit-group" id="minutes">00</span>
        </div>
        <div class="seconds" id="seconds">00</div>
      </div>
    </div>
  </div>

  <script>
    function tick() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('period').textContent = ampm;
      document.getElementById('hours').textContent = String(h).padStart(2, '0');
      document.getElementById('minutes').textContent = String(m).padStart(2, '0');
      document.getElementById('seconds').textContent = String(s).padStart(2, '0');
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
